services:
  api:
    build: .
    container_name: mini_rag_api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_NAME: Mini RAG Chatbot
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/mini_rag
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: mini_rag_worker
    command: uv run celery -A app.worker.celery_app:celery_app worker --loglevel=info --pool=solo
    environment:
      APP_NAME: Mini RAG Chatbot
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/mini_rag
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mini_rag_postgres
    environment:
      POSTGRES_DB: mini_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: mini_rag_redis
    ports:
      - "6379:6379"
